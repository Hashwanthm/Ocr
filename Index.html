<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PDF to Excel Converter</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f3f6fb;
      color: #1f2937;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 72px;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      gap: 16px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 22px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    input[type="file"] {
      background: white;
      color: #111827;
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
      overflow: hidden;
    }

    .panel {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      min-height: 0;
    }

    .panel-header {
      height: 54px;
      padding: 0 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 18px;
      color: #111827;
    }

    .file-name {
      font-size: 13px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    .pdf-area {
      flex: 1;
      background: #1f2937;
      min-height: 0;
    }

    .pdf-preview {
      width: 100%;
      height: 100%;
      border: none;
    }

    .excel-area {
      flex: 1;
      overflow: auto;
      padding: 12px;
      background: white;
      min-height: 0;
    }

    .empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      color: #64748b;
      font-size: 16px;
    }

    .excel-table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
      background: white;
    }

    .excel-table th {
      border: 1px solid #64748b;
      background: #d9eaf7;
      color: #111827;
      padding: 8px;
      min-width: 120px;
      font-size: 13px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .excel-table td {
      border: 1px solid #64748b;
      padding: 7px 10px;
      font-size: 13px;
      min-width: 120px;
      max-width: 320px;
      white-space: normal;
      word-break: break-word;
      vertical-align: top;
    }

    .excel-table tr:nth-child(even) td {
      background: #f8fafc;
    }

    .section-row td {
      background: #b7dee8 !important;
      font-weight: bold;
    }

    .download-btn {
      display: none;
      background: #16a34a;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      white-space: nowrap;
    }

    .download-btn:hover {
      background: #15803d;
    }

    .status {
      padding: 10px 16px;
      border-top: 1px solid #e5e7eb;
      background: #f8fafc;
      font-size: 14px;
      color: #334155;
    }

    .status.success {
      color: #15803d;
      font-weight: bold;
    }

    .status.error {
      color: #dc2626;
      font-weight: bold;
    }

    @media (max-width: 900px) {
      .app {
        height: auto;
        min-height: 100vh;
      }

      .topbar {
        height: auto;
        padding: 16px;
        align-items: flex-start;
        flex-direction: column;
      }

      .main {
        grid-template-columns: 1fr;
        overflow: visible;
      }

      .panel {
        height: 600px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <header class="topbar">
      <h1>PDF to Excel Converter</h1>

      <div class="actions">
        <input id="pdfInput" type="file" accept="application/pdf" />
        <button id="convertBtn">Convert</button>
      </div>
    </header>

    <main class="main">

      <section class="panel">
        <div class="panel-header">
          <h2>PDF Preview</h2>
          <span id="fileName" class="file-name">No file selected</span>
        </div>

        <div id="pdfArea" class="pdf-area">
          <div class="empty">
            Upload a PDF file to preview it here.
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Excel Preview</h2>
          <a id="downloadBtn" class="download-btn" href="#">Download Excel</a>
        </div>

        <div id="excelArea" class="excel-area">
          <div class="empty">
            Converted data preview will appear here.
            Downloaded Excel will be in Form 3A format.
          </div>
        </div>

        <div id="status" class="status">
          Ready
        </div>
      </section>

    </main>

  </div>

  <script>
    const pdfInput = document.getElementById("pdfInput");
    const convertBtn = document.getElementById("convertBtn");
    const pdfArea = document.getElementById("pdfArea");
    const excelArea = document.getElementById("excelArea");
    const fileName = document.getElementById("fileName");
    const statusBox = document.getElementById("status");
    const downloadBtn = document.getElementById("downloadBtn");

    pdfInput.addEventListener("change", function () {
      const file = pdfInput.files[0];

      downloadBtn.style.display = "none";
      downloadBtn.href = "#";

      excelArea.innerHTML = `
        <div class="empty">
          Click Convert to extract data.
          Downloaded Excel will be in Form 3A format.
        </div>
      `;

      if (!file) {
        fileName.textContent = "No file selected";

        pdfArea.innerHTML = `
          <div class="empty">
            Upload a PDF file to preview it here.
          </div>
        `;

        setStatus("Ready", "");
        return;
      }

      fileName.textContent = file.name;

      const pdfUrl = URL.createObjectURL(file);

      pdfArea.innerHTML = `
        <embed class="pdf-preview" src="${pdfUrl}" type="application/pdf" />
      `;

      setStatus("PDF loaded. Click Convert.", "");
    });

    convertBtn.addEventListener("click", async function () {
      const file = pdfInput.files[0];

      if (!file) {
        setStatus("Please select a PDF file first.", "error");
        return;
      }

      const formData = new FormData();
      formData.append("pdf", file);

      convertBtn.disabled = true;
      convertBtn.textContent = "Converting...";
      downloadBtn.style.display = "none";

      setStatus("Converting PDF to Form 3A Excel...", "");

      try {
        const response = await fetch("/convert", {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "Conversion failed");
        }

        renderExcelTable(result.rows);

        downloadBtn.href = result.download_url;
        downloadBtn.style.display = "inline-block";

        setStatus("Converted successfully. Click Download Excel.", "success");

      } catch (error) {
        excelArea.innerHTML = `
          <div class="empty">
            Conversion failed.
          </div>
        `;

        setStatus(error.message, "error");

      } finally {
        convertBtn.disabled = false;
        convertBtn.textContent = "Convert";
      }
    });

    function renderExcelTable(rows) {
      if (!rows || rows.length === 0) {
        excelArea.innerHTML = `
          <div class="empty">
            No data extracted.
          </div>
        `;
        return;
      }

      const maxCols = Math.max(...rows.map(row => row.length));

      let html = `<table class="excel-table">`;

      html += `<thead><tr>`;

      for (let i = 1; i <= maxCols; i++) {
        html += `<th>${getExcelColumnName(i)}</th>`;
      }

      html += `</tr></thead>`;
      html += `<tbody>`;

      rows.forEach(row => {
        const isSectionRow = row.length === 1 && String(row[0]).startsWith("Page ");

        html += `<tr class="${isSectionRow ? "section-row" : ""}">`;

        for (let i = 0; i < maxCols; i++) {
          const value = row[i] || "";
          html += `<td>${escapeHtml(value)}</td>`;
        }

        html += `</tr>`;
      });

      html += `</tbody></table>`;

      excelArea.innerHTML = html;
    }

    function getExcelColumnName(number) {
      let columnName = "";

      while (number > 0) {
        let remainder = (number - 1) % 26;
        columnName = String.fromCharCode(65 + remainder) + columnName;
        number = Math.floor((number - 1) / 26);
      }

      return columnName;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = "status";

      if (type) {
        statusBox.classList.add(type);
      }
    }
  </script>
</body>
</html>
